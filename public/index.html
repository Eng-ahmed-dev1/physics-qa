<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics AI Oracle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Physics AI </h1>
        <p class="subtitle">Ask anything from your study materials</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="questionInput" placeholder="Enter your physics query or ask for an exam..."
                autocomplete="off">
            <button id="askBtn">
                <span>Analyze</span>
            </button>
        </div>
    </div>

    <div class="error-message" id="errorMsg"></div>

    <div class="loading-wrapper" id="loadingIndicator">
        <div class="orbit-spinner">
            <div class="orbit"></div>
            <div class="orbit"></div>
            <div class="core"></div>
        </div>
        <div class="loading-text" id="loadingText">Synthesizing Data...</div>
    </div>

    <!-- Normal Q&A result -->
    <div class="results-container" id="resultsContainer">
        <div class="answer-card">
            <div class="answer-header">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 16v-4"></path>
                    <path d="M12 8h.01"></path>
                </svg>
                <span class="answer-label">AI Synthesis</span>
            </div>
            <div class="answer-text" id="answerText"></div>

            <div class="sources-container" id="sourcesContainer" style="display: none;">
                <div class="sources-label">Reference Nodes</div>
                <div class="badges" id="badgesContainer"></div>
            </div>
        </div>
    </div>

    <!-- Exam result -->
    <div class="results-container" id="examContainer" style="display:none;">
        <div class="exam-container" id="examContent"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
